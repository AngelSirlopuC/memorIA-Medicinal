services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoria}
      POSTGRES_DB: ${POSTGRES_DB:-memoria}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Las migraciones en ./migrations corren automáticamente al crear la BD
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoria} -d ${POSTGRES_DB:-memoria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - imgdata:/data/images
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "8080:80"          # interfaz web en http://localhost:8080
    depends_on:
      - app

volumes:
  pgdata:
  imgdata:
